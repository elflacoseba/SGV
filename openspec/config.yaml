schema: spec-driven

context: |
  Tech stack: C# 14, .NET 10 (net10.0), ASP.NET Core Web API + Razor Pages shell
  Architecture: Clean Architecture (Dominio / Aplicacion / Infraestructura) with SGV.Web as composition shell
  Persistence: EF Core 9.x + Pomelo MySQL 8, Identity string keys, EF interceptor auditing
  Frontend: SGV.Web uses Inspinia starterkit assets with Bun/Gulp pipeline
  Testing: xUnit 2.9.2, coverlet 6.0.2, WebApplicationFactory integration tests, MySQL-backed repository tests
  Style: nullable and implicit usings enabled, PascalCase public members, camelCase locals/params, Async suffix

strict_tdd: true

testing:
  runner: xUnit 2.9.2
  command: dotnet test SGV.slnx
  coverage: coverlet 6.0.2
  coverage_command: dotnet test SGV.slnx --collect:"XPlat Code Coverage"
  layers:
    unit:
      available: true
      tool: xUnit
    integration:
      available: true
      tool: Microsoft.AspNetCore.Mvc.Testing + WebApplicationFactory, MySqlFact
    e2e:
      available: false
      tool: —
  quality:
    linter: false
    type_checker: false
    formatter: false

rules:
  proposal:
    - Keep proposals concise and focused on the change scope
    - Always include a "Non-goals" section
  spec:
    - Write scenarios in Given/When/Then format
    - Each scenario must be independently testable
  design:
    - Follow Clean Architecture principles
    - Reference specific projects in the solution
  tasks:
    - Break tasks into chunks of max 2 hours
    - Each task must be independently testable
  apply:
    - Run dotnet build before creating commits
    - Run dotnet test before marking apply complete
  verify:
    - All tests must pass before archiving
    - Verify behavior matches spec scenarios
